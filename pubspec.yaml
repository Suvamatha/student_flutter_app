name: studyai
description: A modern student productivity app with AI-powered summaries and flashcards.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # File handling
  file_picker: ^6.1.1

  # Animations
  flutter_animate: ^4.3.0

  # Progress indicators
  percent_indicator: ^4.2.3

  # Local storage
  shared_preferences: ^2.2.2

  # Date/time formatting
  intl: ^0.19.0

  # Typography
  google_fonts: ^6.1.0

  # HTTP for AI API calls
  http: ^1.1.0

  # Lottie animations (optional)
  lottie: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
