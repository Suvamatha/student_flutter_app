name: studyai
description: A modern student productivity app with AI-powered summaries and flashcards.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  provider: ^6.1.1
  file_picker: 11.0.2
  flutter_animate: ^4.3.0
  percent_indicator: ^4.2.3
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  google_fonts: ^6.1.0
  http: ^1.1.0
  lottie: ^3.0.0
  syncfusion_flutter_pdf: ^33.1.47
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_local_notifications: ^20.1.0
  timezone: ^0.10.1
  flutter_dotenv: ^6.0.0
  flutter_timezone: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - .env
